# OdaabNote CI/CD - main 브랜치 푸시 시 자동 배포
name: Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Backend
        run: ./gradlew bootJar -x test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: cd frontend && npm ci
        continue-on-error: true

      - name: Install Frontend Dependencies (fallback)
        if: failure()
        run: cd frontend && npm install

      - name: Build Frontend
        run: cd frontend && npm run build
        env:
          VITE_API_BASE: http://${{ secrets.EC2_HOST }}/api

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Deploy to S3
        run: aws s3 sync frontend/dist/ s3://odaabnote-frontend/ --delete

      - name: Deploy to EC2 (Docker)
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key.pem ${EC2_USER}@${EC2_HOST} "mkdir -p /var/www/odaabnote"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key.pem build/libs/odaabnote-0.0.1-SNAPSHOT.jar ${EC2_USER}@${EC2_HOST}:/var/www/odaabnote/app.jar
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key.pem deploy/Dockerfile deploy/.dockerignore ${EC2_USER}@${EC2_HOST}:/var/www/odaabnote/
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key.pem scripts/docker-deploy.sh ${EC2_USER}@${EC2_HOST}:/tmp/
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key.pem ${EC2_USER}@${EC2_HOST} "sudo bash /tmp/docker-deploy.sh"
