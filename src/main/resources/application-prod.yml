# OdaabNote 프로덕션 설정
# 모든 민감 정보는 환경변수로 주입 (EC2, Secrets Manager 등)

spring:
  datasource:
    url: jdbc:mysql://${RDS_ENDPOINT}:3306/odaabnote?useSSL=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never
      # RDS는 schema.sql, data.sql을 수동으로 1회만 실행

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:}
      credentials:
        location: ${GOOGLE_APPLICATION_CREDENTIALS:}

# Gemini API - 환경변수 필수 (하드코딩 금지)
gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-2.5-flash
  generate-content-url: https://generativelanguage.googleapis.com/v1beta/models

server:
  port: 8080

# Swagger - 프로덕션에서는 비활성화
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: false

# CORS - CloudFront URL 또는 도메인 (쉼표 구분)
# 예: https://d1234abcd.cloudfront.net,https://odaabnote.com
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:}
