# 기본 설정 (로컬 개발용)
# 프로덕션: spring.profiles.active=prod + 환경변수 설정
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/odaabnote?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      # 샘플 데이터 비적재 (로컬에서 샘플 넣으려면 data-locations: classpath:data.sql 추가)
      data-locations: []

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  docker:
    compose:
      enabled: false

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:}
      credentials:
        location: ${GOOGLE_APPLICATION_CREDENTIALS:}

# Gemini API - 환경변수 GEMINI_API_KEY 필수 (로컬 개발 시 .env 또는 IDE에서 설정)
gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash
  generate-content-url: https://generativelanguage.googleapis.com/v1beta/models

# CORS - 로컬: localhost, 프로덕션: ALLOWED_ORIGINS 환경변수로 CloudFront/도메인 지정
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

server:
  port: 8080

# Swagger UI (springdoc-openapi)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

